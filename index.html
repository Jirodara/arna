<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ARNA">
<meta name="theme-color" content="#0a0e1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>ARNA — Kripto Sinyal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0e1a;--card:#111827;--border:#1e2d42;
  --green:#00e676;--blue:#29b6f6;--red:#ef5350;--warn:#ffa726;
  --text:#e8eaf0;--sub:#546e7a;--dim:#0d1420
}
html{height:100%;background:var(--bg)}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  height:100%;max-width:430px;margin:0 auto;
  display:flex;flex-direction:column;overflow:hidden;
  /* Safe area for Android notch */
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}

/* ── STATUS BAR ── */
.statusbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px 8px;background:var(--bg);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;flex-shrink:0;
}
.logo{
  font-size:20px;font-weight:900;letter-spacing:3px;
  color:var(--green);display:flex;align-items:center;gap:6px;
}
.logo-icon{font-size:18px}
.status-mid{display:flex;align-items:center;gap:6px}
.pulse{
  width:8px;height:8px;border-radius:50%;
  background:var(--sub);transition:.3s;
}
.pulse.live{background:var(--green);animation:beat 1.4s infinite}
@keyframes beat{
  0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,.5)}
  50%{box-shadow:0 0 0 6px rgba(0,230,118,0)}
}
.status-txt{font-size:11px;font-family:monospace;color:var(--sub)}
.status-txt.live{color:var(--green)}
.clk{font-family:monospace;font-size:12px;color:var(--green)}

/* ── ÖZET ── */
.summary{
  display:grid;grid-template-columns:repeat(3,1fr);
  background:var(--dim);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sum-item{padding:9px 8px;text-align:center;border-right:1px solid var(--border)}
.sum-item:last-child{border-right:none}
.sum-label{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--sub);margin-bottom:3px}
.sum-val{font-family:monospace;font-size:13px;font-weight:700}

/* ── SCROLL ── */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}

/* ── ALARM ── */
.alarm{
  border-radius:12px;padding:11px 14px;margin-bottom:12px;
  text-align:center;display:none;
  border:2px solid var(--green);background:rgba(0,230,118,.07);
}
.alarm.on{display:block;animation:glowAnim 1s infinite alternate}
.alarm.danger{border-color:var(--red)!important;background:rgba(239,83,80,.08)!important;animation:glowRed 1s infinite alternate!important}
@keyframes glowAnim{from{box-shadow:0 0 8px rgba(0,230,118,.2)}to{box-shadow:0 0 22px rgba(0,230,118,.5)}}
@keyframes glowRed{from{box-shadow:0 0 8px rgba(239,83,80,.2)}to{box-shadow:0 0 22px rgba(239,83,80,.5)}}
.alarm h3{font-size:14px;font-weight:900;margin-bottom:3px}
.alarm p{font-size:11px;color:var(--sub);font-family:monospace}

/* ── HATA ── */
.errbox{
  display:none;border-radius:10px;padding:9px 12px;margin-bottom:12px;
  font-size:11px;color:var(--red);background:rgba(239,83,80,.07);
  border:1px solid rgba(239,83,80,.25);font-family:monospace;
}
.errbox.on{display:flex;align-items:center;justify-content:space-between;gap:8px}
.errbox button{padding:4px 10px;border-radius:6px;border:1px solid var(--red);background:transparent;color:var(--red);font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit}

/* ── KONTROL ── */
.ctrl{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.tf{
  padding:7px 14px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  color:var(--sub);font-size:12px;cursor:pointer;font-family:inherit;
}
.tf.on{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.07)}
.analyze-btn{
  margin-left:auto;padding:9px 20px;border-radius:8px;border:none;
  background:var(--blue);color:#0a0e1a;
  font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;
}
.analyze-btn:disabled{background:var(--border);color:var(--sub);cursor:not-allowed}

/* ── COİN KARTI ── */
.coin-card{
  background:var(--card);border-radius:16px;
  border:2px solid var(--border);margin-bottom:12px;overflow:hidden;
  transition:border-color .3s,box-shadow .3s;
}
.coin-card.buy{border-color:var(--green);box-shadow:0 0 24px rgba(0,230,118,.18)}
.coin-card.caution{border-color:var(--warn);box-shadow:0 0 16px rgba(255,167,38,.12)}
.coin-card.active{border-color:var(--blue);box-shadow:0 0 24px rgba(41,182,246,.18)}

/* kart header */
.card-hdr{padding:14px 16px 0}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.cn{font-size:30px;font-weight:900}
.cn-sub{font-size:10px;color:var(--sub);margin-top:1px;font-family:monospace}
.chg{font-family:monospace;font-size:15px;font-weight:700;padding:4px 10px;border-radius:7px}
.chg.up{background:rgba(0,230,118,.12);color:var(--green)}
.chg.dn{background:rgba(239,83,80,.12);color:var(--red)}
.price{font-family:monospace;font-size:34px;font-weight:900;letter-spacing:-1px;margin-bottom:2px}
.price-sub{font-size:10px;color:var(--sub);font-family:monospace;margin-bottom:12px}

/* chart */
.chart-box{padding:0 16px 12px}
canvas{width:100%;height:75px;display:block;border-radius:6px}

/* skor */
.score-box{padding:0 16px 12px}
.score-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px}
.score-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--sub)}
.score-num{font-family:monospace;font-size:28px;font-weight:900}
.score-track{height:9px;background:var(--dim);border-radius:5px;overflow:hidden;margin-bottom:8px}
.score-fill{height:100%;border-radius:5px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:10px;padding:3px 8px;border-radius:20px;background:var(--dim);color:var(--sub);border:1px solid var(--border);font-family:monospace}
.tag.hot{background:rgba(0,230,118,.08);color:var(--green);border-color:rgba(0,230,118,.3)}
.tag.warn{background:rgba(255,167,38,.08);color:var(--warn);border-color:rgba(255,167,38,.3)}

/* göstergeler */
.inds-box{padding:0 16px 12px}
.inds-title{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--sub);margin-bottom:8px}
.inds-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.ind{background:var(--dim);border-radius:9px;padding:8px 9px;border:1px solid var(--border)}
.ind-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.8px;color:var(--sub);margin-bottom:3px}
.ind-val{font-family:monospace;font-size:13px;font-weight:700}
.g{color:var(--green)}.r{color:var(--red)}.y{color:var(--warn)}.b{color:var(--blue)}

/* sinyal banner */
.sig{margin:0 16px 14px;padding:12px;border-radius:10px;text-align:center;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.sig.buy{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);color:var(--green)}
.sig.caution{background:rgba(255,167,38,.08);border:1px solid rgba(255,167,38,.3);color:var(--warn)}
.sig.wait{background:var(--dim);border:1px solid var(--border);color:var(--sub)}

/* ── GİRDİM BUTONU ── */
.btn-enter{
  display:block;width:calc(100% - 32px);
  margin:0 16px 16px;
  padding:18px;border:none;border-radius:13px;
  background:linear-gradient(135deg,#00e676,#00c853);
  color:#0a0e1a;font-size:17px;font-weight:900;
  cursor:pointer;text-transform:uppercase;letter-spacing:1px;
  font-family:inherit;
  box-shadow:0 6px 24px rgba(0,230,118,.35);
  -webkit-appearance:none;
}
.btn-enter:active{transform:scale(.98);box-shadow:0 2px 12px rgba(0,230,118,.3)}
.btn-enter:disabled{background:var(--border);color:var(--sub);box-shadow:none;cursor:not-allowed;transform:none}

/* ── AKTİF İŞLEM ── */
.trade-box{margin:0 16px 16px;background:rgba(41,182,246,.06);border:1px solid rgba(41,182,246,.2);border-radius:13px;padding:13px}
.t-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.t-row:last-of-type{border-bottom:none;padding-bottom:0}
.t-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--sub)}
.t-val{font-family:monospace;font-size:14px;font-weight:700}
.pnl-track{height:7px;background:var(--dim);border-radius:4px;margin:10px 0;overflow:hidden}
.pnl-fill{height:100%;border-radius:4px;transition:width .4s,background .3s}
.btn-exit{
  width:100%;margin-top:10px;padding:14px;
  border:2px solid var(--red);border-radius:10px;
  background:rgba(239,83,80,.08);color:var(--red);
  font-size:14px;font-weight:800;cursor:pointer;
  text-transform:uppercase;font-family:inherit;-webkit-appearance:none;
}
.btn-exit:active{background:rgba(239,83,80,.2)}

/* ── LOADER ── */
.loader{text-align:center;padding:60px 20px}
.spin{font-size:42px;margin-bottom:12px;animation:rotate 1.2s linear infinite;display:inline-block}
@keyframes rotate{to{transform:rotate(360deg)}}
.load-txt{color:var(--blue);font-size:13px;font-family:monospace;margin-bottom:5px}
.load-sub{color:var(--sub);font-size:11px}

/* ── LOG ── */
.log-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:12px;margin-bottom:12px}
.log-title{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--sub);margin-bottom:8px}
.log-list{list-style:none;max-height:85px;overflow-y:auto}
.log-item{display:flex;gap:8px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:10px}
.lt{font-family:monospace;color:var(--sub);white-space:nowrap;min-width:46px}
.lm{color:var(--text)}
.lm.g{color:var(--green)}.lm.r{color:var(--red)}.lm.b{color:var(--blue)}.lm.y{color:var(--warn)}

/* ── INSTALL BANNER ── */
.install-card{
  background:var(--card);border-radius:12px;border:1px solid rgba(41,182,246,.25);
  padding:14px;margin-bottom:12px;display:none;
}
.install-card.on{display:block}
.install-title{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:6px}
.install-steps{font-size:11px;color:var(--sub);line-height:1.8}
.install-steps b{color:var(--text)}
.install-close{float:right;background:none;border:none;color:var(--sub);font-size:16px;cursor:pointer;margin-top:-2px}
</style>
</head>
<body>

<!-- STATUS BAR -->
<div class="statusbar">
  <div class="logo"><span class="logo-icon">⚡</span>ARNA</div>
  <div class="status-mid">
    <div class="pulse" id="pulse"></div>
    <span class="status-txt" id="ws-txt">Bağlanıyor</span>
  </div>
  <div class="clk" id="clk">--:--:--</div>
</div>

<!-- ÖZET BAR -->
<div class="summary">
  <div class="sum-item">
    <div class="sum-label">Sermaye</div>
    <div class="sum-val" style="color:var(--text)">100K ₺</div>
  </div>
  <div class="sum-item">
    <div class="sum-label">İşlem</div>
    <div class="sum-val" id="sb-sym" style="color:var(--blue)">—</div>
  </div>
  <div class="sum-item">
    <div class="sum-label">Kar/Zarar</div>
    <div class="sum-val" id="sb-pnl" style="color:var(--sub)">—</div>
  </div>
</div>

<!-- BODY -->
<div class="body">

  <!-- ALARM -->
  <div class="alarm" id="alarm">
    <h3 id="alarm-t"></h3>
    <p id="alarm-s"></p>
  </div>

  <!-- HATA -->
  <div class="errbox" id="errbox">
    <span id="err-msg"></span>
    <button onclick="runAnalysis()">Tekrar Dene</button>
  </div>

  <!-- KONTROL -->
  <div class="ctrl">
    <span style="font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px">Grafik:</span>
    <button class="tf on" id="tf1" onclick="setTF('1m')">1 DAK</button>
    <button class="tf" id="tf5" onclick="setTF('5m')">5 DAK</button>
    <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()">⚡ ANALİZ ET</button>
  </div>

  <!-- COİN ALANI -->
  <div id="coinArea">
    <div class="loader">
      <div class="spin">⚡</div>
      <div class="load-txt" id="ldtxt">Binance TRY piyasasına bağlanılıyor...</div>
      <div class="load-sub">En iyi fırsat aranıyor</div>
    </div>
  </div>

  <!-- INSTALL BANNER -->
  <div class="install-card" id="installCard">
    <button class="install-close" onclick="document.getElementById('installCard').className='install-card'">✕</button>
    <div class="install-title">📱 Ana Ekrana Uygulama Olarak Ekle</div>
    <div class="install-steps">
      1. Chrome menüsüne (⋮) dokun<br>
      2. <b>"Ana ekrana ekle"</b> seçeneğine bas<br>
      3. <b>"Ekle"</b> ye bas — ARNA uygulaması gibi açılır!
    </div>
  </div>

  <!-- LOG -->
  <div class="log-card">
    <div class="log-title">📋 Sistem Günlüğü</div>
    <ul class="log-list" id="loglist"></ul>
  </div>

</div><!-- /body -->

<script>
'use strict';

/* ═══════════════════════════════════════════
   ARNA Kripto Sinyal — PWA v1
   Binance TRY Piyasası · 9 Gösterge · Scalping
═══════════════════════════════════════════ */

const CAP = 100000, SL = -3000, T1 = 2000, T2 = 3000;
const API = 'https://api.binance.com/api/v3';
const STABLES = new Set(['USDT','BUSD','FDUSD','USDC','DAI','TUSD','USDP','EUR','GBP','BRL','AUD']);

let TF = '1m';
let coin = null;
let trade = null;
let ws = null;
let busy = false;
let prevMacd = {};
let prevScore = {};
let elTimer = null;
let elSec = 0;

/* ─── LocalStorage ─── */
const LS = {
  save() {
    try {
      localStorage.setItem('arna_tf', TF);
      localStorage.setItem('arna_trade', trade ? JSON.stringify(trade) : '');
      if (coin) localStorage.setItem('arna_coin', JSON.stringify({ ...coin, klines: [] }));
    } catch(e) {}
  },
  load() {
    try {
      TF = localStorage.getItem('arna_tf') || '1m';
      const t = localStorage.getItem('arna_trade');
      if (t) trade = JSON.parse(t);
      const c = localStorage.getItem('arna_coin');
      if (c) coin = JSON.parse(c);
    } catch(e) {}
  }
};

/* ─── Saat ─── */
setInterval(() => {
  const e = document.getElementById('clk');
  if (e) e.textContent = new Date().toLocaleTimeString('tr-TR');
}, 1000);

/* ─── Log ─── */
function lg(msg, cls) {
  const t = new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const li = document.createElement('li');
  li.className = 'log-item';
  li.innerHTML = `<span class="lt">${t}</span><span class="lm ${cls||''}">${msg}</span>`;
  const list = document.getElementById('loglist');
  list.insertBefore(li, list.firstChild);
  while (list.children.length > 40) list.removeChild(list.lastChild);
}

/* ─── WS ─── */
function setWSOk(ok) {
  document.getElementById('pulse').className = 'pulse' + (ok ? ' live' : '');
  const t = document.getElementById('ws-txt');
  t.className = 'status-txt' + (ok ? ' live' : '');
  t.textContent = ok ? 'CANLI' : 'Bağlanıyor';
}

function openWS(sym) {
  if (ws) { try { ws.close(); } catch(e) {} ws = null; }
  setWSOk(false);
  try {
    ws = new WebSocket(`wss://stream.binance.com:9443/ws/${sym.toLowerCase()}@miniTicker`);
    ws.onopen = () => { setWSOk(true); lg('WS canlı: ' + sym.replace('TRY',''), 'g'); };
    ws.onmessage = ev => {
      try {
        const d = JSON.parse(ev.data);
        if (!coin || coin.symbol !== d.s) return;
        coin.price = +d.c;
        coin.change = +d.P;
        const pe = document.getElementById('live-price');
        if (pe) pe.textContent = tryFmt(coin.price) + ' ₺';
        const ce = document.getElementById('live-chg');
        if (ce) {
          ce.textContent = (coin.change >= 0 ? '+' : '') + coin.change.toFixed(2) + '%';
          ce.className = 'chg ' + (coin.change >= 0 ? 'up' : 'dn');
        }
        if (trade && trade.symbol === coin.symbol) refreshTrade();
      } catch(e) {}
    };
    ws.onerror = () => setWSOk(false);
    ws.onclose = () => {
      setWSOk(false);
      setTimeout(() => { if (coin) openWS(coin.symbol); }, 5000);
    };
  } catch(e) { setWSOk(false); }
}

/* ─── Trade ─── */
function refreshTrade() {
  if (!trade || !coin) return;
  const pnl = (coin.price - trade.entryPrice) / trade.entryPrice * CAP;
  const pct = ((coin.price - trade.entryPrice) / trade.entryPrice * 100).toFixed(2);
  const col = pnl >= 0 ? 'var(--green)' : 'var(--red)';

  const sp = document.getElementById('sb-pnl');
  if (sp) { sp.textContent = pnlFmt(pnl); sp.style.color = col; }
  const tp = document.getElementById('t-pnl');
  if (tp) { tp.textContent = pnlFmt(pnl) + ' (' + pct + '%)'; tp.style.color = col; }
  const tpr = document.getElementById('t-cur');
  if (tpr) tpr.textContent = tryFmt(coin.price) + ' ₺';
  const pf = document.getElementById('pnl-fill');
  if (pf) { pf.style.width = Math.max(0, Math.min(100, pnl/T2*100)) + '%'; pf.style.background = col; }

  if      (pnl <= SL) showAlarm('🔴 STOP-LOSS! HEMEN ÇIKIŞ YAP!', 'Zarar: ' + pnlFmt(pnl), true);
  else if (pnl >= T2) showAlarm('💰 HEDEF AŞILDI! ÇIKIŞ ZAMANI!', 'Kar: ' + pnlFmt(pnl));
  else if (pnl >= T1) showAlarm('✅ HEDEF BÖLGEDE', 'Kar: ' + pnlFmt(pnl));
  else                hideAlarm();
}

window.enterTrade = function(sym) {
  if (trade) { alert('Zaten açık işlem var!'); return; }
  if (!coin) return;
  trade = { symbol: sym, entryPrice: coin.price, entryTime: Date.now() };
  LS.save();
  document.getElementById('sb-sym').textContent = sym.replace('TRY','');
  startEl();
  lg('✅ GİRİŞ: ' + sym.replace('TRY','') + ' @ ' + tryFmt(coin.price) + ' ₺', 'g');
  renderCoin();
  refreshTrade();
};

window.exitTrade = function() {
  if (!trade || !coin) return;
  const pnl = (coin.price - trade.entryPrice) / trade.entryPrice * CAP;
  const el = Math.floor((Date.now() - trade.entryTime) / 1000);
  lg((pnl>=0?'💰':'⚠️') + ' ÇIKIŞ: ' + trade.symbol.replace('TRY','') + ' | ' + pnlFmt(pnl) + ' | ' + Math.floor(el/60)+'d '+el%60+'s', pnl>=0?'b':'r');
  trade = null;
  if (elTimer) { clearInterval(elTimer); elTimer = null; }
  LS.save();
  document.getElementById('sb-sym').textContent = '—';
  const sp = document.getElementById('sb-pnl');
  if (sp) { sp.textContent = '—'; sp.style.color = 'var(--sub)'; }
  hideAlarm();
  renderCoin();
};

function startEl() {
  if (elTimer) clearInterval(elTimer);
  elSec = trade ? Math.floor((Date.now() - trade.entryTime) / 1000) : 0;
  if (!trade) return;
  elTimer = setInterval(() => {
    elSec++;
    const e = document.getElementById('t-elapsed');
    if (e) e.textContent = Math.floor(elSec/60)+'d '+elSec%60+'s';
  }, 1000);
}

/* ─── Alarm ─── */
function showAlarm(t, s, danger) {
  const el = document.getElementById('alarm');
  el.className = 'alarm on' + (danger ? ' danger' : '');
  document.getElementById('alarm-t').textContent = t;
  document.getElementById('alarm-s').textContent = s;
}
function hideAlarm() { document.getElementById('alarm').className = 'alarm'; }

/* ─── Format ─── */
function tryFmt(p) {
  if (!p && p !== 0) return '0';
  if (p >= 100000) return p.toLocaleString('tr-TR', {maximumFractionDigits:0});
  if (p >= 1000)   return p.toLocaleString('tr-TR', {minimumFractionDigits:2,maximumFractionDigits:2});
  if (p >= 1)      return p.toLocaleString('tr-TR', {minimumFractionDigits:2,maximumFractionDigits:4});
  if (p >= 0.01)   return p.toFixed(6);
  return p.toFixed(8);
}
function pnlFmt(n) { return (n>=0?'+':'') + Math.round(n).toLocaleString('tr-TR') + ' ₺'; }
function volFmt(v) {
  if (v>=1e9) return (v/1e9).toFixed(1)+'B ₺';
  if (v>=1e6) return (v/1e6).toFixed(1)+'M ₺';
  return (v/1e3).toFixed(0)+'K ₺';
}
function nowT() { return new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }

/* ═══════════════════
   GÖSTERGELER
═══════════════════ */
function ema(arr, p) {
  if (!arr || arr.length < p) return arr?.[arr.length-1] ?? 0;
  const k = 2/(p+1);
  let v = arr.slice(0,p).reduce((a,b)=>a+b,0)/p;
  for (let i=p; i<arr.length; i++) v = arr[i]*k + v*(1-k);
  return v;
}

// RSI — Wilder Smoothing (gerçek yöntem)
function rsi(closes, p) {
  p = p||14;
  if (!closes || closes.length < p+1) return 50;
  let avgG=0, avgL=0;
  for (let i=1; i<=p; i++) {
    const d = closes[i]-closes[i-1];
    if (d>0) avgG+=d; else avgL+=Math.abs(d);
  }
  avgG/=p; avgL/=p;
  for (let i=p+1; i<closes.length; i++) {
    const d = closes[i]-closes[i-1];
    avgG = (avgG*(p-1)+(d>0?d:0))/p;
    avgL = (avgL*(p-1)+(d<0?Math.abs(d):0))/p;
  }
  return avgL===0 ? 100 : 100 - 100/(1+avgG/avgL);
}

// MACD (12,26,9) — adım adım doğru
function macd(closes) {
  if (!closes || closes.length<35) return {hist:0,line:0,sig:0};
  let e12 = closes.slice(0,12).reduce((a,b)=>a+b,0)/12;
  let e26 = closes.slice(0,26).reduce((a,b)=>a+b,0)/26;
  const ml=[];
  for (let i=12; i<closes.length; i++) e12=closes[i]*(2/13)+e12*(11/13);
  // Yeniden hesapla — tüm MACD değerlerini topla
  let ee12=closes.slice(0,12).reduce((a,b)=>a+b,0)/12;
  let ee26=closes.slice(0,26).reduce((a,b)=>a+b,0)/26;
  for (let i=1; i<closes.length; i++) {
    ee12=closes[i]*(2/13)+ee12*(11/13);
    if (i>=25) {
      ee26=closes[i]*(2/27)+ee26*(25/27);
      ml.push(ee12-ee26);
    }
  }
  if (ml.length<9) return {hist:0,line:ml[ml.length-1]||0,sig:0};
  let sg=ml.slice(0,9).reduce((a,b)=>a+b,0)/9;
  for (let i=9; i<ml.length; i++) sg=ml[i]*(2/10)+sg*(8/10);
  const last=ml[ml.length-1];
  return {hist:last-sg, line:last, sig:sg};
}

// Bollinger (20,2)
function boll(closes) {
  const p=20;
  if (!closes || closes.length<p) { const l=closes?.[closes.length-1]??1; return {upper:l*1.02,lower:l*0.98,bw:0.04}; }
  const sl=closes.slice(-p), mid=sl.reduce((a,b)=>a+b,0)/p;
  const std=Math.sqrt(sl.reduce((a,b)=>a+(b-mid)**2,0)/p);
  return {upper:mid+2*std, lower:mid-2*std, bw:std*4/mid};
}

// Stochastic RSI (14,14,3)
function stochRsi(closes) {
  if (!closes || closes.length<28) return {k:50,d:50};
  const rv=[];
  for (let i=14; i<=closes.length; i++) rv.push(rsi(closes.slice(0,i),14));
  // Son 14 RSI üzerinden stoch
  const last14=rv.slice(-14);
  const lo=Math.min(...last14), hi=Math.max(...last14);
  // K değerleri (3-periyot SMA)
  const kRaw=[];
  for (let i=13; i<rv.length; i++) {
    const w=rv.slice(Math.max(0,i-13),i+1);
    const mn=Math.min(...w), mx=Math.max(...w);
    kRaw.push(mx===mn ? 50 : (rv[i]-mn)/(mx-mn)*100);
  }
  const k3=kRaw.slice(-3).reduce((a,b)=>a+b,0)/Math.min(3,kRaw.length);
  const d3=kRaw.slice(-6).reduce((a,b)=>a+b,0)/Math.min(6,kRaw.length);
  return {k:isNaN(k3)?50:k3, d:isNaN(d3)?50:d3};
}

// ATR (14)
function atr(klines) {
  if (!klines||klines.length<2) return 0;
  const sl=klines.slice(-14);
  return sl.map((k,i,a)=>i===0?k.h-k.l:Math.max(k.h-k.l,Math.abs(k.h-a[i-1].c),Math.abs(k.l-a[i-1].c))).reduce((a,b)=>a+b,0)/sl.length;
}

// Williams %R (14)
function willR(klines) {
  if (!klines||klines.length<14) return -50;
  const sl=klines.slice(-14);
  const hi=Math.max(...sl.map(k=>k.h)), lo=Math.min(...sl.map(k=>k.l));
  return hi===lo ? -50 : ((hi-sl[sl.length-1].c)/(hi-lo))*-100;
}

// OBV trendi
function obvTrend(klines) {
  if (!klines||klines.length<10) return 0;
  let o=0; const arr=[0];
  for (let i=1;i<klines.length;i++) {
    if (klines[i].c>klines[i-1].c) o+=klines[i].v;
    else if (klines[i].c<klines[i-1].c) o-=klines[i].v;
    arr.push(o);
  }
  return ema(arr,5)>ema(arr,20) ? 1 : -1;
}

// Hacim oranı (son mum / ortalama)
function volRatio(klines) {
  if (!klines||klines.length<5) return 1;
  const vols=klines.slice(-20).map(k=>k.v);
  const avg=vols.slice(0,-1).reduce((a,b)=>a+b,0)/(vols.length-1||1);
  return avg===0 ? 1 : vols[vols.length-1]/avg;
}

/* ═══════════════════
   SKOR — Scalping
   Toplam max: 100
═══════════════════ */
function scoreIt(ind) {
  let s=0; const hot=[], warm=[];

  // RSI(6) — en hızlı
  if      (ind.rsi6<15)  {s+=22;hot.push('RSI6<15 🔥');}
  else if (ind.rsi6<25)  {s+=15;hot.push('RSI6 aşırı satım');}
  else if (ind.rsi6<35)  {s+=7; warm.push('RSI6 düşük');}

  // RSI(14) — trend teyidi
  if      (ind.rsi14<25) {s+=10;hot.push('RSI14 dipte');}
  else if (ind.rsi14<35) {s+=5; warm.push('RSI14 düşük');}

  // StochRSI
  if      (ind.stochK<5)  {s+=20;hot.push('StochRSI<5 🔥');}
  else if (ind.stochK<15) {s+=13;hot.push('StochRSI dipte');}
  else if (ind.stochK<25) {s+=7; warm.push('StochRSI düşük');}
  if (ind.stochK>ind.stochD && ind.stochK<30) {s+=6;warm.push('StochRSI ↑ kesiyor');}

  // MACD
  if      (ind.macdHist>0 && ind.macdHist>ind.prevHist) {s+=15;hot.push('MACD dönüş ✓');}
  else if (ind.macdHist>ind.prevHist)                    {s+=8; warm.push('MACD ivme kazanıyor');}

  // Bollinger
  const bbR=ind.bbUpper-ind.bbLower;
  const bbP=bbR>0 ? (ind.price-ind.bbLower)/bbR : 0.5;
  if      (bbP<0.02) {s+=18;hot.push('BB alt bandında 🔥');}
  else if (bbP<0.10) {s+=11;hot.push('BB alt banda yakın');}
  else if (bbP<0.20) {s+=5; warm.push('BB alt yarıda');}
  if (ind.bbWidth<0.01) {s+=4;warm.push('BB daralıyor');}

  // EMA
  const ed=ind.ema20>0 ? (ind.ema7-ind.ema20)/ind.ema20*100 : 0;
  if      (ed>0&&ed<1)    {s+=6;warm.push('EMA7>EMA20');}
  else if (ed>-0.5&&ed<0) {s+=4;warm.push('EMA kesişim yakın');}

  // Williams %R
  if      (ind.willR<-90) {s+=8;hot.push('Williams<-90');}
  else if (ind.willR<-75) {s+=4;warm.push('Williams düşük');}

  // OBV
  if (ind.obvTrend>0) {s+=4;warm.push('OBV ↑');}

  // Hacim
  if      (ind.volRatio>3)   {s+=7;hot.push('Hacim '+ind.volRatio.toFixed(1)+'x 🔥');}
  else if (ind.volRatio>1.8) {s+=4;warm.push('Hacim artıyor');}

  return {
    score: Math.min(Math.round(s),100),
    tags: [...hot,...warm]
  };
}

/* ─── Grafik ─── */
function drawChart(id, klines, sig) {
  const cv=document.getElementById(id);
  if (!cv||!klines||klines.length<2) return;
  const ctx=cv.getContext('2d');
  cv.width=cv.offsetWidth; cv.height=75;
  const W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);
  const cl=klines.map(k=>k.c).filter(x=>x>0);
  if (cl.length<2) return;
  const mn=Math.min(...cl), mx=Math.max(...cl), rng=mx-mn||1;
  const col=sig==='buy'?'#00e676':sig==='caution'?'#ffa726':'#546e7a';
  ctx.beginPath();
  cl.forEach((c,i)=>{const x=i/(cl.length-1)*W,y=H-(c-mn)/rng*(H-6)-3;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.strokeStyle=col;ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,col+'2a');g.addColorStop(1,col+'00');
  ctx.fillStyle=g;ctx.fill();
}

      </div>
      <div class="score-track"><div class="score-fill" style="width:${coin.score}%;background:${scCol}"></div></div>
      <div class="tags">
        ${(coin.tags||[]).slice(0,5).map(t=>`<span class="tag${t.includes('🔥')?' hot':''}">${t}</span>`).join('')}
      </div>
    </div>

    <div class="inds-box">
      <div class="inds-title">Teknik Göstergeler</div>

        <div class="ind"><div class="ind-lbl">RSI (14)</div><div class="ind-val ${coin.ind.rsi14<30?'g':coin.ind.rsi14>70?'r':'y'}">${coin.ind.rsi14.toFixed(1)}</div></div>
        <div class="ind"><div class="ind-lbl">StochRSI K</div><div class="ind-val ${coin.ind.stochK<20?'g':coin.ind.stochK>80?'r':'y'}">${coin.ind.stochK.toFixed(1)}</div></div>
        <div class="ind"><div class="ind-lbl">MACD</div><div class="ind-val ${coin.ind.macdHist>0?'g':'r'}">${coin.ind.macdHist>0?'▲':'▼'} ${Math.abs(coin.ind.macdHist).toExponential(1)}</div></div>

/* ═══════════════════
   ANA ANALİZ
═══════════════════ */
async function runAnalysis() {
  if (busy) return;
  busy=true;
  const btn=document.getElementById('analyzeBtn');
  btn.textContent='⏳ Analiz...';
  btn.disabled=true;
  const eb=document.getElementById('errbox');
  eb.className='errbox';

  function setMsg(t){const e=document.getElementById('ldtxt');if(e)e.textContent=t;}

  try {
    setMsg('Binance TRY piyasası bağlanılıyor...');
    lg('Analiz başladı', 'b');

    // Tüm ticker'ları çek
    const r=await fetch(API+'/ticker/24hr',{signal:AbortSignal.timeout(10000)});
    if (!r.ok) throw new Error('Binance HTTP '+r.status);
    const all=await r.json();

    // TRY çiftlerini filtrele
    const tryPairs=all
      .filter(t=>{
        if (!t.symbol.endsWith('TRY')) return false;
        const base=t.symbol.replace('TRY','');
        if (STABLES.has(base)) return false;
        if (+t.quoteVolume<50000) return false;
        return true;
      })
      .sort((a,b)=>+a.priceChangePercent - +b.priceChangePercent);

    if (!tryPairs.length) throw new Error('TRY çifti bulunamadı');
    lg('TRY çifti: '+tryPairs.length+' adet · En düşük 20 analiz ediliyor', 'b');

    const candidates=tryPairs.slice(0,20);
    let best=null, bestSc=-1;

    for (let i=0;i<candidates.length;i++) {
      const t=candidates[i];
      const sym=t.symbol;
      setMsg(sym.replace('TRY','') + ' analiz ediliyor... ('+( i+1)+'/'+candidates.length+')');
      try {
        const kr=await fetch(`${API}/klines?symbol=${sym}&interval=${TF}&limit=120`,{signal:AbortSignal.timeout(6000)});
        if (!kr.ok) continue;
        const kd=await kr.json();
        if (!Array.isArray(kd)||kd.length<30) continue;
        const klines=kd.map(k=>({o:+k[1],h:+k[2],l:+k[3],c:+k[4],v:+k[5]}));
        const closes=klines.map(k=>k.c);
        const price=+t.lastPrice;
        const ph=prevMacd[sym]||0;
        const mc=macd(closes);
        prevMacd[sym]=mc.hist;
        const bb=boll(closes);
        const st=stochRsi(closes);
        const ind={
          rsi6:    rsi(closes,6),
          rsi14:   rsi(closes,14),
          stochK:  st.k, stochD: st.d,
          macdHist:mc.hist, prevHist:ph,
          bbUpper: bb.upper, bbLower:bb.lower, bbWidth:bb.bw,
          ema7:    ema(closes,7), ema20:ema(closes,20),
          atr:     atr(klines),
          willR:   willR(klines),
          obvTrend:obvTrend(klines),
          volRatio:volRatio(klines),
          price
        };
        const {score,tags}=scoreIt(ind);
        const ps=prevScore[sym]||0;
        prevScore[sym]=score;
        if (score>bestSc) {
          bestSc=score;
          best={symbol:sym,price,change:+t.priceChangePercent,volume:+t.quoteVolume,klines,ind,
            sig:score>=72?'buy':score>=45?'caution':'wait',score,tags,prevScore:ps,analyzedAt:nowT()};
        }
      } catch(e2) { lg(t.symbol+' atlandı','y'); }
    }

    if (!best) throw new Error('Hiçbir coin analiz edilemedi');

    coin=best;
    LS.save();
    openWS(coin.symbol);

    if (coin.sig==='buy'&&coin.prevScore<72) {
      showAlarm('🚀 '+coin.symbol.replace('TRY','')+' — AL SİNYALİ!','Skor: '+coin.score+'/100 · '+(coin.tags[0]||''));
      lg('🚀 AL SİNYALİ: '+coin.symbol.replace('TRY','')+' | '+coin.score+'/100','g');
    } else {
      lg('Analiz tamam: '+coin.symbol.replace('TRY','')+' ('+tryFmt(coin.price)+' ₺) | Skor:'+coin.score,'g');
    }
    renderCoin();

  } catch(err) {
    document.getElementById('err-msg').textContent='⚠️ '+err.message;
    eb.className='errbox on';
    lg('Hata: '+err.message,'r');
    if (coin) renderCoin();
  } finally {
    busy=false;
    btn.textContent='⚡ ANALİZ ET';
    btn.disabled=false;
  }
}
